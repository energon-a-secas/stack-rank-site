<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA routing workaround
    // Redirect to index.html with the current path encoded in a parameter
    (function() {
      var pathSegments = window.location.pathname.split('/').filter(function(segment) {
        return segment.length > 0;
      });

      if (pathSegments.length > 0) {
        // Encode the path and redirect to index.html with it as a parameter
        var encodedPath = '/' + pathSegments.join('/') + '/';
        var targetUrl = window.location.origin + '/index.html?p=' + encodeURIComponent(encodedPath);
        window.location.replace(targetUrl);
      } else {
        // Just redirect to index if no path
        window.location.replace(window.location.origin + '/index.html');
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
